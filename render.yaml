services:
  - type: web
    name: marketplace-kh-server
    env: node
    plan: free
    repo: https://github.com/chhunly45/Kh.Product.git
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        value: "mongodb+srv://username:password@cluster.mongodb.net/konpuk?retryWrites=true&w=majority"
        sync: false
      - key: JWT_SECRET
        value: "your-secret-key-here"
        sync: false
      - key: CLIENT_URL
        value: "https://konpuk.com"
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: "your-cloud-name"
        sync: false
      - key: CLOUDINARY_API_KEY
        value: "your-api-key"
        sync: false
      - key: CLOUDINARY_API_SECRET
        value: "your-api-secret"
        sync: false
      - key: NODE_ENV
        value: production
        sync: false
